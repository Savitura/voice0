<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#080818" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#080818" rx="80"/>
  <rect width="512" height="512" fill="url(#bgGlow)" rx="80"/>

  <!-- Waveform bars — bell curve, pill-shaped, white -->
  <!-- Bar 1: cx=161, h=85 -->
  <rect x="147" y="175" width="28" height="85"  rx="14" fill="#ffffff"/>
  <!-- Bar 2: cx=209, h=133 -->
  <rect x="195" y="152" width="28" height="133" rx="14" fill="#ffffff"/>
  <!-- Bar 3: cx=256, h=171 (tallest, center) -->
  <rect x="242" y="133" width="28" height="171" rx="14" fill="#ffffff"/>
  <!-- Bar 4: cx=303, h=133 -->
  <rect x="289" y="152" width="28" height="133" rx="14" fill="#ffffff"/>
  <!-- Bar 5: cx=351, h=85 -->
  <rect x="337" y="175" width="28" height="85"  rx="14" fill="#ffffff"/>

  <!-- Wallet card body -->
  <rect x="180" y="337" width="152" height="57" rx="14" fill="#ffffff"/>
  <!-- Chip cutout -->
  <rect x="204" y="351" width="38"  height="19" rx="5"  fill="#080818"/>
</svg>
