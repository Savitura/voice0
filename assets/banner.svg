<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080818" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#080818" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#080818"/>

  <!-- Subtle glow behind icon -->
  <ellipse cx="300" cy="320" rx="280" ry="260" fill="url(#iconGlow)"/>
  <!-- Subtle glow behind text -->
  <ellipse cx="900" cy="320" rx="380" ry="260" fill="url(#rightGlow)"/>

  <!-- Icon box -->
  <rect x="100" y="120" width="400" height="400" rx="60" fill="#0b0b1c" stroke="#ffffff0d" stroke-width="1"/>

  <!-- Waveform bars inside banner icon (scaled 0.78125x, offset 100,120) -->
  <!-- Bar 1: cx=226, h=66 -->
  <rect x="215" y="257" width="22" height="66"  rx="11" fill="#ffffff"/>
  <!-- Bar 2: cx=263, h=104 -->
  <rect x="252" y="239" width="22" height="104" rx="11" fill="#ffffff"/>
  <!-- Bar 3: cx=300, h=134 -->
  <rect x="289" y="224" width="22" height="134" rx="11" fill="#ffffff"/>
  <!-- Bar 4: cx=337, h=104 -->
  <rect x="326" y="239" width="22" height="104" rx="11" fill="#ffffff"/>
  <!-- Bar 5: cx=374, h=66 -->
  <rect x="363" y="257" width="22" height="66"  rx="11" fill="#ffffff"/>

  <!-- Wallet card -->
  <rect x="241" y="383" width="119" height="45" rx="11" fill="#ffffff"/>
  <!-- Chip -->
  <rect x="259" y="394" width="30"  height="15" rx="4"  fill="#0b0b1c"/>

  <!-- Vertical divider -->
  <line x1="560" y1="140" x2="560" y2="500" stroke="#ffffff12" stroke-width="1"/>

  <!-- Brand name -->
  <text
    x="620" y="310"
    font-family="'Courier New', 'SF Mono', monospace"
    font-size="100"
    font-weight="bold"
    fill="#ffffff"
    letter-spacing="-2">voice0</text>

  <!-- Tagline -->
  <text
    x="622" y="372"
    font-family="'Courier New', 'SF Mono', monospace"
    font-size="26"
    fill="#8888aa">Voice-first Solana wallet for Android</text>

  <!-- Sub-tagline -->
  <text
    x="622" y="415"
    font-family="'Courier New', 'SF Mono', monospace"
    font-size="19"
    fill="#44445a">Say it. Sign it. Done.</text>

  <!-- Tech pill: Solana -->
  <rect x="622" y="450" width="98"  height="30" rx="15" fill="#9945FF18" stroke="#9945FF" stroke-width="1"/>
  <text x="671" y="470" font-family="'Courier New', monospace" font-size="13" fill="#9945FF" text-anchor="middle">Solana</text>

  <!-- Tech pill: MWA -->
  <rect x="730" y="450" width="66"  height="30" rx="15" fill="#14F19518" stroke="#14F195" stroke-width="1"/>
  <text x="763" y="470" font-family="'Courier New', monospace" font-size="13" fill="#14F195" text-anchor="middle">MWA</text>

  <!-- Tech pill: Kotlin -->
  <rect x="806" y="450" width="76"  height="30" rx="15" fill="#7F52FF18" stroke="#7F52FF" stroke-width="1"/>
  <text x="844" y="470" font-family="'Courier New', monospace" font-size="13" fill="#a080ff" text-anchor="middle">Kotlin</text>

  <!-- Tech pill: Groq AI -->
  <rect x="892" y="450" width="86"  height="30" rx="15" fill="#ff884418" stroke="#ff8844" stroke-width="1"/>
  <text x="935" y="470" font-family="'Courier New', monospace" font-size="13" fill="#ffaa77" text-anchor="middle">Groq AI</text>
</svg>
